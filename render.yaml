databases:
  - name: mobifix-db
    databaseName: mobifix
    user: mobifix_user
    plan: free

services:
  - type: web
    name: mobifix-api
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mobifix-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
